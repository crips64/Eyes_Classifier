apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files: [/etc/prometheus/alerts.yml]
    scrape_configs:
      - job_name: mlops-backend
        static_configs:
          - targets: ["backend-service:8000"]
  alerts.yml: |
    groups:
      - name: mlops-eyes
        rules:
          - alert: ModelDriftDetected
            expr: max(mlops_data_drift_detected or mlops_target_drift_detected or mlops_prediction_drift_detected or mlops_concept_drift_detected) > 0
            for: 1m
            labels: {severity: warning}
          - alert: LowLabeledAccuracy
            expr: mlops_labeled_accuracy < 0.85
            for: 5m
            labels: {severity: critical}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - {name: http, containerPort: 9090}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: data, mountPath: /prometheus}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  selector: {app: prometheus}
  ports:
    - {name: http, port: 9090, targetPort: http}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: MLOps Eyes
        type: file
        options:
          path: /var/lib/grafana/dashboards
  dashboard.json: |
    {
      "title": "MLOps Eyes Dashboard",
      "uid": "mlops-eyes-dashboard",
      "schemaVersion": 39,
      "panels": [
        {"id":1,"type":"stat","title":"Predictions","targets":[{"expr":"mlops_predictions_total"}]},
        {"id":2,"type":"gauge","title":"Labeled accuracy","targets":[{"expr":"mlops_labeled_accuracy"}]},
        {"id":3,"type":"stat","title":"Drift alerts","targets":[{"expr":"mlops_drift_alerts_total"}]},
        {"id":4,"type":"timeseries","title":"Latency p95","targets":[{"expr":"histogram_quantile(0.95, sum(rate(mlops_prediction_latency_seconds_bucket[5m])) by (le))"}]},
        {"id":5,"type":"stat","title":"Active model","targets":[{"expr":"mlops_active_model == 1","legendFormat":"{{version}}"}]},
        {"id":6,"type":"timeseries","title":"Retraining","targets":[{"expr":"sum by (trigger, mode) (mlops_retrain_requests_total)"}]},
        {"id":7,"type":"timeseries","title":"Drift flags","targets":[{"expr":"mlops_data_drift_detected","legendFormat":"data"},{"expr":"mlops_target_drift_detected","legendFormat":"target"},{"expr":"mlops_prediction_drift_detected","legendFormat":"prediction"},{"expr":"mlops_concept_drift_detected","legendFormat":"concept"}]}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - {name: http, containerPort: 3000}
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: admin}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          volumeMounts:
            - {name: provisioning, mountPath: /etc/grafana/provisioning/datasources/datasource.yml, subPath: datasource.yml}
            - {name: provisioning, mountPath: /etc/grafana/provisioning/dashboards/provider.yml, subPath: dashboard-provider.yml}
            - {name: provisioning, mountPath: /var/lib/grafana/dashboards/dashboard.json, subPath: dashboard.json}
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  selector: {app: grafana}
  ports:
    - {name: http, port: 3000, targetPort: http}
