apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlops-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: retrain-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: retrain-job-manager
subjects:
  - kind: ServiceAccount
    name: mlops-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: retrain-job-manager
