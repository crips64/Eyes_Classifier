apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - {name: api, containerPort: 9000}
            - {name: console, containerPort: 9001}
          readinessProbe:
            httpGet: {path: /minio/health/ready, port: api}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /minio/health/live, port: api}
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 1Gi}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  selector: {app: minio}
  ports:
    - {name: api, port: 9000, targetPort: api}
    - {name: console, port: 9001, targetPort: console}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          envFrom:
            - secretRef:
                name: minio-credentials
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local http://minio-service:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc mb local/mlops-eyes --ignore-existing
