apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.22.0
          command:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --allowed-hosts
            - mlflow-service,mlflow-service:5000,localhost,127.0.0.1
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - /mlflow/artifacts
            - --serve-artifacts
          ports:
            - {name: http, containerPort: 5000}
          readinessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 10
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 1Gi}
          volumeMounts:
            - {name: data, mountPath: /mlflow}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
spec:
  selector: {app: mlflow}
  ports:
    - {name: http, port: 5000, targetPort: http}
