name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: mlops-eyes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  conventional-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            build
            ci
            chore

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch==2.5.1 torchvision==0.20.1 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -v --cov=backend --cov-report=term-missing --cov-fail-under=75

      - name: Validate DVC pipeline without remote access
        run: |
          dvc dag
          test -f data/reference.dvc
          test -f eye_cnn_best_val_final.pth.dvc

      - uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl kustomize k8s/overlays/minikube > /tmp/rendered.yaml
          kubectl kustomize k8s/overlays/minikube-local > /tmp/rendered-local.yaml

      - name: Validate Docker Compose
        run: docker compose config --quiet

  docker-build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: docker/Dockerfile.backend
          - component: frontend
            dockerfile: docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: mlops-eyes-${{ matrix.component }}:test
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: docker/Dockerfile.backend
          - component: frontend
            dockerfile: docker/Dockerfile.frontend
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize repository owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/mlopseyes-${{ matrix.component }}:sha-${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/mlopseyes-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  update-gitops:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update immutable image tags on gitops branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git fetch origin gitops:gitops; then
            git switch gitops
            git merge origin/main --no-edit
          else
            git switch -c gitops
          fi
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          cat > k8s/overlays/minikube/kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
            - ../../base
          images:
            - name: mlopseyes-backend
              newName: ghcr.io/${owner}/mlopseyes-backend
              newTag: sha-${GITHUB_SHA}
            - name: mlopseyes-frontend
              newName: ghcr.io/${owner}/mlopseyes-frontend
              newTag: sha-${GITHUB_SHA}
          EOF
          sed -i -E "s#(name: RETRAIN_IMAGE, value: )[^}]+#\1ghcr.io/${owner}/mlopseyes-backend:sha-${GITHUB_SHA}#" k8s/base/backend.yaml
          git add k8s/overlays/minikube/kustomization.yaml k8s/base/backend.yaml
          git commit -m "chore(deploy): promote ${GITHUB_SHA}" || exit 0
          git push origin gitops
