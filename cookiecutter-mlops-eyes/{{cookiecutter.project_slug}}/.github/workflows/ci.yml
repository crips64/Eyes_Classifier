name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "{{cookiecutter.python_version}}"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -v
      - run: docker compose config --quiet
